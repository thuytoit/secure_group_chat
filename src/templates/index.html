<!DOCTYPE html>
<html>
<head><title>Secure Chat Login</title></head>
<body>
  <h1>Login/Register for Secure Group Chat</h1>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required><br>
    <input type="password" id="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
  </form>
  <form id="registerForm">
    <input type="text" id="regUser" placeholder="New Username" required><br>
    <input type="password" id="regPass" placeholder="New Password" required><br>
    <button type="submit">Register</button>
  </form>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
  <script>
    const socket = io();
    document.getElementById('loginForm').onsubmit = async e => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const formData = new FormData();
      formData.append('username', user);
      formData.append('password', pass);
      const res = await fetch('/login', {method: 'POST', body: formData});
      const data = await res.json();
      if (data.success) window.location = '/chat';
      else alert(data.msg || 'Login failed');
    };
    document.getElementById('registerForm').onsubmit = async e => {
      e.preventDefault();
      const user = document.getElementById('regUser').value;
      const pass = document.getElementById('regPass').value;
      const formData = new FormData();
      formData.append('username', user);
      formData.append('password', pass);
      const res = await fetch('/register', {method: 'POST', body: formData});
      const data = await res.json();
      alert(data.msg || 'Register failed');
      if (data.success) document.getElementById('loginForm').querySelector('#username').value = user;
    };
  </script>
</body>
</html>
