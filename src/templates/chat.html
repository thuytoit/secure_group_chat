<!DOCTYPE html>
<html>
<head><title>Secure Group Chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
  <h1>Chat: {{ username }} ({{ role }})</h1>
  <a href="/logout">Logout</a><br>
  <div id="messages" style="border:1px solid #ccc; height:200px; overflow-y:scroll; padding:10px;"></div>
  <input id="msgInput" placeholder="Type message..." style="width:300px;">
  <button onclick="sendMsg()">Send</button><br>
  {% if role == 'admin' %}
  <input id="kickUser" placeholder="Username to kick">
  <button onclick="kickUser()">Kick (Rotates Key)</button>
  {% endif %}
  <script>
    // DH Setup - Match your crypto.py params exactly!
    const g = 2n;
    const p = 0xB6F676C1440DBDAF286A55D9CC2826E67355B077EB15D49D93981E685852282B1A5F15B9C4FD15C0A17A234DC414B46868A785CDDB55DA662DD64BFAF7E32D33D28273DA1CEBAC9CF2BD720E492FCF01AD3AC4A2B04843FA7DDF8279C7459F7AC078E87282D7B417D478466809EE2981E32681A792F6C2454FA62DA4CB2498C7n;
    const hexLen = 256;  // For full 1024-bit/128-byte hex
  
    let groupKey;  // WordArray for AES
    let userKey;   // For group_key decrypt
    let priv;      // Client private key (generated NOW, before socket)
    let dhTimeout; // For retry
  
    // Generate fixed priv IMMEDIATELY (large enough for full pub, no race issues)
    priv = 0x123456789abcdef0n;
    console.log('Client priv set at load:', priv.toString(16));  // Expect: 123456789abcdef0
  
    const socket = io();
  
    socket.on('connect', () => {
      console.log('Socket connected - priv ready:', priv.toString(16));
    });
  
    socket.on('dh_pub', data => {
      console.log('Received server pub');
      if (!priv || priv === 0n) {
        console.error('Priv not set - refresh page');
        addMsg('Error: Key setup failed - refresh');
        return;
      }
      try {
        console.log('Priv for compute:', priv.toString(16));
        const peerPub = BigInt('0x' + data.pub);
        console.log('Server pub sample:', peerPub.toString(16).substring(0, 20) + '...');
        const shared = powMod(peerPub, priv, p);
        console.log('Shared computed sample:', shared.toString(16).substring(0, 20) + '...');
        // PAD TO FULL 128 BYTES to match Python shared bytes
        const sharedHex = shared.toString(16).padStart(hexLen, '0');
        console.log('Padded sharedHex sample:', sharedHex.substring(0, 20) + '... (len: ' + sharedHex.length + ')');
        userKey = CryptoJS.PBKDF2(CryptoJS.enc.Hex.parse(sharedHex), CryptoJS.enc.Utf8.parse('fixed_salt_for_demo'), {keySize: 8, iterations: 100000});
        console.log('User key derived');
  
        // Emit our pub
        const pub = powMod(g, priv, p);
        console.log('Computed pub sample:', pub.toString(16).substring(0, 20) + '... (full len:', pub.toString(16).length, ')');  // Expect ~49dc... len~256
        if (pub <= 1n || pub >= p) {
          console.error('Invalid pub computed:', pub.toString(16));
          addMsg('Error: Invalid pub key - refresh');
          return;
        }
        const pubHex = pub.toString(16).padStart(hexLen, '0');
        console.log('Sent client pub sample:', pubHex.substring(0, 10) + '...');
        socket.emit('dh_peer', {pub: pubHex});
  
        // Timeout for group_key
        dhTimeout = setTimeout(() => {
          if (!groupKey) {
            console.log('Group key timeout - check server logs');
            addMsg('Warning: Key setup slow - wait or refresh');
          }
        }, 10000);
      } catch (e) {
        console.error('DH error:', e);
        addMsg('DH key exchange failed - refresh page');
      }
    });
  
    socket.on('group_key', data => {
      if (!userKey) {
        console.log('No user key yet—skipping');
        return;
      }
      try {
        const encBytes = CryptoJS.enc.Hex.parse(data.enc);
        const iv = encBytes.clone(); iv.sigBytes = 16; encBytes.clamp(); encBytes.words.splice(0, 4); encBytes.sigBytes -= 16;
        const decKey = CryptoJS.AES.decrypt({ciphertext: encBytes}, userKey, {iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7});
        groupKey = decKey;  // Raw decrypted WordArray (32 bytes for AES-256 key)
        console.log('Group key set! (sigBytes:', groupKey.sigBytes, ')');
        if (dhTimeout) clearTimeout(dhTimeout);
      } catch (e) {
        console.error('Group key decrypt failed:', e);
        addMsg('Failed to decrypt group key - refresh');
      }
    });
  
    socket.on('error', data => {
      console.error('Server error:', data.msg);
      addMsg('Error: ' + data.msg);
    });
  
    socket.on('reconnected', data => addMsg(data.msg));
    socket.on('joined', data => {
      const currentUser = '{{ username }}';
      if (data.msg.includes(currentUser + ' joined the group!')) return;
      addMsg(data.msg);
    });
    socket.on('notice', data => addMsg(data.msg));
    socket.on('encrypted_msg', data => {
      if (!groupKey) {
        console.log('No group key yet—skipping');
        addMsg(`From ${data.sender}: [Key not ready—wait]`);
        return;
      }
      try {
        const enc = CryptoJS.enc.Hex.parse(data.enc);
        const iv = enc.clone(); iv.sigBytes = 16; enc.clamp(); enc.words.splice(0, 4); enc.sigBytes -= 16;
        const decrypted = CryptoJS.AES.decrypt({ciphertext: enc}, groupKey, {iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7});
        const plain = decrypted.toString(CryptoJS.enc.Utf8);
        addMsg(`From ${data.sender}: ${plain || '[Decrypt fail—key mismatch]'}`);
      } catch (e) {
        console.error('Decrypt error:', e);
        addMsg(`From ${data.sender}: [Decrypt error]`);
      }
    });
    socket.on('kicked', data => { alert(data.msg || 'Kicked!'); window.location = '/'; });
  
    function addMsg(msg) {
      const messagesDiv = document.getElementById('messages');
      messagesDiv.innerHTML += `<p>${new Date().toLocaleTimeString()}: ${msg}</p>`;
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  
    function sendMsg() {
      const msgInput = document.getElementById('msgInput');
      const msg = msgInput.value.trim();
      if (msg && socket.connected) {
        if (!groupKey) {
          addMsg('Error: Key not ready—wait a moment or refresh');
          return;
        }
        const msgBytes = CryptoJS.enc.Utf8.parse(msg);
        const iv = CryptoJS.lib.WordArray.random(16);
        const encrypted = CryptoJS.AES.encrypt(msgBytes, groupKey, {iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7});
        const encWithIv = iv.concat(encrypted.ciphertext);
        socket.emit('message', {enc: encWithIv.toString(CryptoJS.enc.Hex)});
        addMsg(`You: ${msg}`);  // Local echo
        msgInput.value = '';
      } else if (!socket.connected) {
        addMsg('Error: Not connected—retry send');
      }
    }
  
    function kickUser() {
      const user = document.getElementById('kickUser').value.trim();
      if (user && socket.connected) {
        socket.emit('admin_kick', {user});
        document.getElementById('kickUser').value = '';
      }
    }
  
    function powMod(base, exp, mod) {
      let res = 1n;
      base = base % mod;
      if (base === 0n || exp === 0n) return 0n;  // Avoid invalid
      exp = exp % (mod - 1n);  // Optional: Fermat, but safe
      while (exp > 0n) {
        if (exp % 2n === 1n) res = (res * base) % mod;
        base = (base * base) % mod;
        exp /= 2n;
      }
      return res;
    }
  </script>
</body>
</html>
